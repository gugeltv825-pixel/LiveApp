name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webcam-apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/WebCam-Studio.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebCam-Studio-APK
          path: webcam-apk/out/WebCam-Studio.apk

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: WebCam Studio v1.0.${{ github.run_number }}
          files: webcam-apk/out/WebCam-Studio.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
